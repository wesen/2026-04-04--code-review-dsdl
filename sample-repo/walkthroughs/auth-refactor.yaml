walkthrough:
  title: "PR #482: Refactor auth middleware"
  repo: github/acme/backend
  base: main
  head: feat/auth-refactor
  authors:
    - alice
    - bob

  steps:
    - id: step-1
      type: text
      body: |
        This PR replaces the legacy session-based auth with JWT tokens.
        We'll walk through the changes bottom-up, starting at the token utility layer.

    - id: step-2
      type: source
      file: src/utils/token.ts
      lines: [12, 48]
      highlight: [30, 35]
      note: "New verifyToken helper — note the fallback on L34."

    - id: step-3
      type: diff
      file: src/middleware/auth.ts
      hunks: [2, 3]
      collapse: false
      note: "Session lookup replaced with verifyToken call."

    - id: step-4
      type: code
      lang: typescript
      body: |
        // Before (conceptual)
        const user = await Session.find(req.cookie.sid);
        // After
        const user = decodeJWT(req.headers.authorization);

    - id: step-5
      type: annotation
      file: src/middleware/auth.ts
      line: 42
      severity: warn
      body: "Race condition if token refresh fires mid-request."

    - id: step-6
      type: checkpoint
      prompt: "What happens if the token is expired?"
      choices:
        - text: "Returns 401 Unauthorized"
          correct: true
          explain: "See L34 — the catch block returns early."
        - text: "Falls back to session auth"
          correct: false
          explain: "Session fallback was removed in this PR."
        - text: "Silently ignores the error"
          correct: false
          explain: "No — expired tokens always throw."

    - id: step-7
      type: reveal
      label: "Show edge-case discussion"
      body: |
        If the clock is skewed >30s, exp validation can reject valid tokens.
        We may want clockTolerance in the verify options.

    - id: step-8
      type: link
      url: https://jwt.io/introduction
      label: "JWT primer (external)"
